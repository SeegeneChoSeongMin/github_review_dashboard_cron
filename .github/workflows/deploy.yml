name: Build and Deploy to Azure

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: githubdashboardacr.azurecr.io
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            githubdashboardacr.azurecr.io/panopticon-cron:latest
            githubdashboardacr.azurecr.io/panopticon-cron:${{ github.sha }}
      # ACR webhook이 :latest 푸시를 감지하여 App Service를 자동으로 재시작합니다.
